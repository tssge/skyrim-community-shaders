# Community Shaders Configuration Template for SpecialK Compatibility
#
# This file demonstrates configuration options that could be implemented
# to help resolve conflicts between Community Shaders and SpecialK
#
# Copy this to CommunityShaders.ini in your Skyrim directory and modify as needed

[Compatibility]
# Detect SpecialK automatically and warn user
DetectSpecialK=1

# Enable cooperation with SpecialK using its hook management API (RECOMMENDED)
# This allows both tools to work together without conflicts
UseSpecialKCooperation=1

# Skip DirectX hooks when SpecialK is detected (prevents conflicts but disables CS features)
# Only used as fallback when cooperation is not available
SkipHooksWithSpecialK=0

# Enable compatibility mode - reduces functionality but may improve stability
SpecialKCompatibilityMode=0

# Log compatibility warnings to help with troubleshooting
VerboseCompatibilityLogging=1

# Delay hook installation to let SpecialK initialize first (milliseconds)
HookInstallationDelay=1000

[SpecialKCooperation]
# Advanced SpecialK cooperation settings (only used when UseSpecialKCooperation=1)

# Use SpecialK's centralized hook manager for all DirectX hooks
UseSharedHookManager=1

# Allow SpecialK to manage Present() call chain
DelegatePresent=1

# Allow SpecialK to manage swap chain operations
DelegateSwapChain=1

# Allow SpecialK to manage device creation
DelegateDeviceCreation=1

# Timeout in milliseconds to wait for SpecialK API initialization
CooperationTimeout=5000

# Retry cooperation initialization if it fails initially
RetryCooperationInit=1

# Prefer cooperation over fallback compatibility modes
PreferCooperation=1

[Features]
# Disable specific features that are known to conflict with SpecialK
# Set to 0 to disable, 1 to enable
# Note: When cooperation mode is active, these may not be necessary

# FidelityFX features that require Present() hooking
DisableFidelityFXWithSpecialK=0

# Streamline features that require DXGI hooks
DisableStreamlineWithSpecialK=0

# HDR features that modify swap chain creation
DisableHDRWithSpecialK=0

# Frame generation features
DisableFrameGenerationWithSpecialK=0

[Diagnostics]
# Enable additional logging for debugging conflicts
EnableConflictDiagnostics=0

# Dump hook chain information
DumpHookChainInfo=0

# Monitor DirectX function calls for conflicts
MonitorDirectXCalls=0

# Log SpecialK API interactions
LogSpecialKCooperation=1

[Advanced]
# Expert-only settings - modify with caution

# Force use of legacy compatibility mode even when cooperation is available
ForceCompatibilityMode=0

# Use alternative hooking methods when conflicts detected
AlternativeHookingMode=0

# Hook installation order priority (lower = earlier)
HookPriority=100

# Maximum time to wait for other tools to initialize (milliseconds)
InitializationTimeout=5000

[Workarounds]
# Temporary workarounds for specific conflict scenarios

# Retry failed hook installations
RetryFailedHooks=1

# Use backup hooking methods
UseBackupHookMethods=1

# Disable problematic features automatically
AutoDisableConflictingFeatures=1

# Alternative DirectX device creation path
UseAlternativeDeviceCreation=0

[Logging]
# Log levels: 0=Off, 1=Error, 2=Warning, 3=Info, 4=Debug
CompatibilityLogLevel=3

# Log file for compatibility issues
CompatibilityLogFile=CommunityShaders_Compatibility.log

# Include system information in logs
IncludeSystemInfo=1

# Log detected graphics tools
LogDetectedTools=1

#
# Example usage scenarios:
#
# Scenario 1: SpecialK Cooperation Mode (RECOMMENDED)
# UseSpecialKCooperation=1, UseSharedHookManager=1, PreferCooperation=1
# This allows both tools to work together seamlessly
#
# Scenario 2: Basic conflict detection and warnings
# DetectSpecialK=1, VerboseCompatibilityLogging=1, UseSpecialKCooperation=0
#
# Scenario 3: Conservative compatibility mode (reduced functionality)
# SpecialKCompatibilityMode=1, ForceCompatibilityMode=1
#
# Scenario 4: Skip hooks entirely when SpecialK detected
# SkipHooksWithSpecialK=1 (disables most Community Shaders features)
#
# Scenario 5: Debug/troubleshooting mode
# EnableConflictDiagnostics=1, DumpHookChainInfo=1, CompatibilityLogLevel=4
#