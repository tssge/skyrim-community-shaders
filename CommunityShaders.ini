[Compatibility]
# Enable SpecialK cooperation mode (RECOMMENDED)
# This allows both tools to work together using SpecialK's shared hook management
UseSpecialKCooperation=1

# Detect SpecialK automatically and warn user
DetectSpecialK=1

# Skip DirectX hooks when SpecialK is detected (fallback if cooperation fails)
SkipHooksWithSpecialK=0

# Log compatibility warnings to help with troubleshooting
VerboseCompatibilityLogging=1

[SpecialKCooperation]
# Use SpecialK's centralized hook manager for all DirectX hooks
UseSharedHookManager=1

# Allow SpecialK to manage Present() call chain
DelegatePresent=1

# Allow SpecialK to manage swap chain operations
DelegateSwapChain=1

# Allow SpecialK to manage device creation
DelegateDeviceCreation=1

# Timeout in milliseconds to wait for SpecialK API initialization
CooperationTimeout=5000

# Prefer cooperation over fallback compatibility modes
PreferCooperation=1

[Logging]
# Log level for compatibility issues: 0=Off, 1=Error, 2=Warning, 3=Info, 4=Debug
CompatibilityLogLevel=3

# Log detected graphics tools
LogDetectedTools=1