name: Run Formatters
on:
    #push:
    pull_request:
        branches:
            - main
            - dev
    workflow_dispatch:
        inputs:
            format-all:
                description: "Run full auto-formatting on this branch"
                required: false
                default: "true"

permissions:
    contents: write
    pull-requests: write

jobs:
    format:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ github.head_ref }}
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}
            - name: Notice for manual workflow trigger
              if: github.event_name == 'workflow_dispatch'
              run: echo "ℹ️ Running format workflow manually. If this is your fork, formatting changes will be committed to your branch."
            - name: Set up git config
              run: |
                git config --local user.email "action@github.com"
                git config --local user.name "GitHub Action"
            # format the latest commit
            - uses: DoozyX/clang-format-lint-action@v0.20
              with:
                  source: "."
                  exclude: "extern include"
                  extensions: "h,cpp,c,hlsl,hlsli"
                  clangFormatVersion: 20
                  inplace: True # commit the changes (if there are any)
            - name: Check for changes and commit
              run: |
                if [ -n "$(git status --porcelain)" ]; then
                  git add .
                  git commit -m "style: 🎨 apply clang-format changes"
                  git push
                else
                  echo "No changes to commit"
                fi

    prettier_format:
        needs: format
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ github.head_ref }}
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}
            - name: Notice for manual workflow trigger
              if: github.event_name == 'workflow_dispatch'
              run: echo "ℹ️ Running format workflow manually. If this is your fork, formatting changes will be committed to your branch."
            - name: Set up git config
              run: |
                git config --local user.email "action@github.com"
                git config --local user.name "GitHub Action"
            - name: Run Prettier
              run: npx prettier --write .
            - name: Check for changes and commit
              run: |
                if [ -n "$(git status --porcelain)" ]; then
                  git add .
                  git commit -m "style: 🎨 apply Prettier formatting"
                  git push
                else
                  echo "No changes to commit"
                fi
