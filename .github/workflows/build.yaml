name: build Community Shaders and addons
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      cache-key-suffix:
        description: 'Optional suffix to invalidate the build cache'
        required: false
  pull_request_target:
    paths:
      - '**.cpp'
      - '**.h'
      - '**.hpp'
      - '**.c'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - 'vcpkg-configuration.json'
      - '.gitmodules'
      - 'extern/**'
permissions:
  contents: write
  pull-requests: write
jobs:
  build:
    if: >
      github.event_name != 'pull_request_target' ||
      github.event.pull_request.draft == false ||
      contains(github.event.pull_request.labels.*.name, 'force-build')
    name: build plugin and addons
    runs-on: windows-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
        - uses: actions/checkout@v3
          with:
            fetch-depth: 0
            
        # Extract the submodule commit hashes to create a cache key
        - name: Get submodule hashes
          id: get-submodule-hashes
          shell: bash
          run: |
            # Get a hash of all the submodule commits for cache key
            echo "submodule_hash=$(git submodule status | awk '{print $1}' | sort | sha256sum | cut -d' ' -f1)" >> $GITHUB_OUTPUT
            
        # Cache submodules to avoid re-cloning them
        - name: Cache Git submodules
          id: cache-submodules
          uses: actions/cache@v3
          with:
            path: |
              .git/modules
              extern
            key: ${{ runner.os }}-submodules-${{ steps.get-submodule-hashes.outputs.submodule_hash }}
            
        # Initialize submodules if not cached
        - name: Initialize submodules
          if: steps.cache-submodules.outputs.cache-hit != 'true'
          run: git submodule update --init --recursive
            
        - uses: ilammy/msvc-dev-cmd@v1.10.0

        # Cache the vcpkg repository itself (to avoid re-cloning it)
        - name: Cache vcpkg repository
          uses: actions/cache@v3
          id: vcpkg-repo-cache
          with:
            path: |
              vcpkg
            key: ${{ runner.os }}-vcpkg-repo-${{ hashFiles('vcpkg-configuration.json') }}
            restore-keys: |
              ${{ runner.os }}-vcpkg-repo-

        # Cache vcpkg installed packages
        - name: Cache vcpkg packages
          uses: actions/cache@v3
          id: vcpkg-packages-cache
          with:
            path: |
              ${{ github.workspace }}/vcpkg_installed
            key: ${{ runner.os }}-vcpkg-installed-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
            restore-keys: |
              ${{ runner.os }}-vcpkg-installed-

        # Set up vcpkg manually to handle custom ports
        - name: Setup vcpkg
          if: steps.vcpkg-repo-cache.outputs.cache-hit != 'true'
          run: |
            git clone https://github.com/microsoft/vcpkg.git
            cd vcpkg
            .\bootstrap-vcpkg.bat

        # Install vcpkg dependencies manually
        - name: Install vcpkg dependencies
          run: |
            .\vcpkg\vcpkg.exe install --triplet=x64-windows
          
        # Cache CMake build output with a more precise cache key for better hits
        - name: Cache CMake build output
          uses: actions/cache@v3
          with:
            path: build/ALL
            key: ${{ runner.os }}-cmake-${{ inputs.cache-key-suffix || 'default' }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'CMakeLists.txt', 'CMakePresets.json') }}-${{ steps.get-submodule-hashes.outputs.submodule_hash }}-${{ hashFiles('**/*.cpp', '**/*.c', '**/*.h', '**/*.hpp') }}
            restore-keys: |
              ${{ runner.os }}-cmake-${{ inputs.cache-key-suffix || 'default' }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'CMakeLists.txt', 'CMakePresets.json') }}-${{ steps.get-submodule-hashes.outputs.submodule_hash }}-
              ${{ runner.os }}-cmake-${{ inputs.cache-key-suffix || 'default' }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'CMakeLists.txt', 'CMakePresets.json') }}-
              ${{ runner.os }}-cmake-${{ inputs.cache-key-suffix || 'default' }}-

        - name: Build using run-cmake with ALL preset
          uses: lukka/run-cmake@v10
          with:
            configurePreset: ALL
            buildPreset: ALL
            
        - name: extract version from CMake
          id: get_version
          shell: bash
          run: |
            VERSION=$(grep 'CMAKE_PROJECT_VERSION:STATIC' build/ALL/CMakeCache.txt | cut -d= -f2)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            
        - name: Upload dist artifacts
          if: success()
          uses: actions/upload-artifact@v4
          with:
            name: dist-artifacts
            path: dist/
            
  prerelease:
    needs: build
    if: github.event_name == 'pull_request_target'
    runs-on: windows-latest
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: dist/
          
      - name: upload prerelease
        uses: ncipollo/release-action@v1
        with:
          name: "Community Shaders ${{ needs.build.outputs.version }} PR #${{ github.event.pull_request.number }}"
          tag: v${{ needs.build.outputs.version }}-pr${{ github.event.pull_request.number }}
          prerelease: true
          artifacts: "${{ github.workspace }}/dist/CommunityShaders_AIO-*.7z"
          generateReleaseNotes: true
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          
      - name: comment on PR
        if: success()
        uses: thollander/actions-comment-pull-request@v3
        with:
          mode: upsert
          message: |
            ✅ A pre-release build is available for this PR:
            [Download](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.build.outputs.version }}-pr${{ github.event.pull_request.number }})
            
  release:
    needs: build
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: dist/
          
      - name: create tagged release
        uses: ncipollo/release-action@v1
        with:
          name: "Community Shaders ${{ github.ref_name }}"
          draft: true
          tag: ${{ github.ref_name }}
          artifacts: "${{ github.workspace }}/dist/*.7z"
          generateReleaseNotes: true
          replacesArtifacts: true
          removeArtifacts: true