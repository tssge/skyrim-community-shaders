name: build Community Shaders and addons

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      cache-key-suffix:
        description: "Optional suffix to invalidate the build cache"
        required: false
  pull_request_target:
    paths:
      - "**.cpp"
      - "**.h"
      - "**.hpp"
      - "**.c"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "vcpkg.json"
      - "vcpkg-configuration.json"
      - ".gitmodules"
      - "extern/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    if: >
      github.event_name != 'pull_request_target' ||
      github.event.pull_request.draft == false ||
      contains(github.event.pull_request.labels.*.name, 'force-build')
    name: Build plugin and addons
    runs-on: windows-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          submodules: recursive

      - uses: ilammy/msvc-dev-cmd@v1.10.0

      - uses: lukka/run-vcpkg@v11.5
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Cache CMake build output
        uses: actions/cache@v3
        with:
          path: build/ALL
          key: ${{ runner.os }}-build-${{ inputs.cache-key-suffix || 'default' }}-${{ hashFiles('.gitmodules', 'extern/**', 'CMakePresets.json', 'vcpkg.json', 'vcpkg-configuration.json', '**/CMakeLists.txt', '**/*.cpp', '**/*.c', '**/*.h', '**/*.hpp') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Build using run-cmake with ALL preset
        uses: lukka/run-cmake@v10
        with:
          configurePreset: ALL
          buildPreset: ALL

      - name: Extract version from CMake
        id: get_version
        shell: bash
        run: |
          VERSION=$(grep 'CMAKE_PROJECT_VERSION:STATIC' build/ALL/CMakeCache.txt | cut -d= -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload dist artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts
          path: dist/

  prerelease:
    if: github.event_name == 'pull_request_target'
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.repository.default_branch }}
          submodules: recursive

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: dist/

      - name: Generate release notes comparing against base version tag
        id: gen_notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="v${{ needs.build.outputs.version }}-pr${{ github.event.pull_request.number }}"
          BASE_TAG="v${{ needs.build.outputs.version }}"
          PR_URL="https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}"

          echo "🔍 Comparing $BASE_SHA...$HEAD_SHA"

          NOTES=$(gh api repos/$REPO/compare/$BASE_SHA...$HEAD_SHA | jq -r '
            .commits[] | "- \(.commit.message | split("\n")[0]) by @\(.author.login // $author)"
          ')

          echo "$NOTES" > release-notes.md
          echo -e "\n[View Pull Request](https://github.com/$REPO/pull/$PR_NUMBER)" >> release-notes.md
          echo "bodyfile=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Upload prerelease
        uses: ncipollo/release-action@v1
        with:
          name: "Community Shaders ${{ needs.build.outputs.version }} PR #${{ github.event.pull_request.number }}"
          tag: v${{ needs.build.outputs.version }}-pr${{ github.event.pull_request.number }}
          prerelease: true
          artifacts: "${{ github.workspace }}/dist/CommunityShaders_AIO-*.7z"
          bodyFile: release-notes.md
          generateReleaseNotes: false
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true

      - name: Comment on PR
        if: success()
        uses: thollander/actions-comment-pull-request@v3
        with:
          mode: upsert
          message: |
            ✅ A pre-release build is available for this PR:
            [Download](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.build.outputs.version }}-pr${{ github.event.pull_request.number }})

  release:
    needs: build
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.repository.default_branch }}
          submodules: recursive

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: dist/

      - name: Create tagged release
        uses: ncipollo/release-action@v1
        with:
          name: "Community Shaders ${{ github.ref_name }}"
          draft: true
          tag: ${{ github.ref_name }}
          artifacts: "${{ github.workspace }}/dist/*.7z"
          generateReleaseNotes: true
          replacesArtifacts: true
          removeArtifacts: true
