name: build Community Shaders and addons
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      cache-key-suffix:
        description: 'Optional suffix to invalidate the build cache'
        required: false
  pull_request_target:
    paths:
      - '**.cpp'
      - '**.h'
      - '**.hpp'
      - '**.c'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - 'vcpkg-configuration.json'
      - '.gitmodules'
      - 'extern/**'
permissions:
  contents: write
  pull-requests: write
jobs:
  build:
    if: >
      github.event_name != 'pull_request_target' ||
      github.event.pull_request.draft == false ||
      contains(github.event.pull_request.labels.*.name, 'force-build')
    name: build plugin and addons
    runs-on: windows-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
        - uses: actions/checkout@v3
          with:
            submodules: recursive
            fetch-depth: 0
            
        - uses: ilammy/msvc-dev-cmd@v1.10.0
        
        # Cache vcpkg binaries and downloads to speed up bootstrapping
        - name: Cache vcpkg binary
          id: cache-vcpkg-binary
          uses: actions/cache@v3
          with:
            path: |
              vcpkg/vcpkg.exe
              vcpkg/downloads
            key: ${{ runner.os }}-vcpkg-binary-1
            
        # Cache vcpkg installed packages
        - name: Cache vcpkg installed packages
          id: cache-vcpkg-installed
          uses: actions/cache@v3
          with:
            path: |
              vcpkg/installed
              vcpkg/packages
              vcpkg/buildtrees
            key: ${{ runner.os }}-vcpkg-installed-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
            restore-keys: |
              ${{ runner.os }}-vcpkg-installed-
        
        # Set up vcpkg with the appropriate configuration
        - name: Setup vcpkg
          run: |
            # Clone vcpkg if not already present
            if (-not (Test-Path vcpkg)) {
              git clone https://github.com/microsoft/vcpkg.git
            }
            
            # Bootstrap vcpkg if not already done
            if (-not (Test-Path vcpkg/vcpkg.exe)) {
              cd vcpkg
              ./bootstrap-vcpkg.bat
              cd ..
            }
            
            # Set VCPKG_ROOT environment variable for this workflow
            echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" >> $GITHUB_ENV
            
        # Install dependencies using vcpkg
        - name: Install dependencies
          run: |
            ./vcpkg/vcpkg.exe install --triplet=x64-windows --x-install-root=${{ github.workspace }}/vcpkg/installed
          env:
            VCPKG_ROOT: ${{ github.workspace }}/vcpkg
            
        # Cache CMake build output
        - name: Cache CMake build output
          uses: actions/cache@v3
          with:
            path: build/ALL
            key: ${{ runner.os }}-cmake-${{ inputs.cache-key-suffix || 'default' }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'CMakeLists.txt', 'CMakePresets.json') }}-${{ hashFiles('**/*.cpp', '**/*.c', '**/*.h', '**/*.hpp', '.gitmodules', 'extern/**') }}
            restore-keys: |
              ${{ runner.os }}-cmake-${{ inputs.cache-key-suffix || 'default' }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'CMakeLists.txt', 'CMakePresets.json') }}-
              ${{ runner.os }}-cmake-${{ inputs.cache-key-suffix || 'default' }}-

        - name: Build using run-cmake with ALL preset
          uses: lukka/run-cmake@v10
          with:
            configurePreset: ALL
            buildPreset: ALL
          env:
            VCPKG_ROOT: ${{ github.workspace }}/vcpkg
            
        - name: extract version from CMake
          id: get_version
          shell: bash
          run: |
            VERSION=$(grep 'CMAKE_PROJECT_VERSION:STATIC' build/ALL/CMakeCache.txt | cut -d= -f2)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            
        - name: Upload dist artifacts
          if: success()
          uses: actions/upload-artifact@v4
          with:
            name: dist-artifacts
            path: dist/
            
  prerelease:
    needs: build
    if: github.event_name == 'pull_request_target'
    runs-on: windows-latest
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: dist/
          
      - name: upload prerelease
        uses: ncipollo/release-action@v1
        with:
          name: "Community Shaders ${{ needs.build.outputs.version }} PR #${{ github.event.pull_request.number }}"
          tag: v${{ needs.build.outputs.version }}-pr${{ github.event.pull_request.number }}
          prerelease: true
          artifacts: "${{ github.workspace }}/dist/CommunityShaders_AIO-*.7z"
          generateReleaseNotes: true
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          
      - name: comment on PR
        if: success()
        uses: thollander/actions-comment-pull-request@v3
        with:
          mode: upsert
          message: |
            ✅ A pre-release build is available for this PR:
            [Download](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.build.outputs.version }}-pr${{ github.event.pull_request.number }})
            
  release:
    needs: build
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: dist/
          
      - name: create tagged release
        uses: ncipollo/release-action@v1
        with:
          name: "Community Shaders ${{ github.ref_name }}"
          draft: true
          tag: ${{ github.ref_name }}
          artifacts: "${{ github.workspace }}/dist/*.7z"
          generateReleaseNotes: true
          replacesArtifacts: true
          removeArtifacts: true