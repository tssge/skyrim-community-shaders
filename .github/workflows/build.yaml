name: build Community Shaders and addons
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      cache-key-suffix:
        description: 'Optional suffix to invalidate the build cache'
        required: false
  pull_request_target:
    paths:
      - '**.cpp'
      - '**.h'
      - '**.hpp'
      - '**.c'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - 'vcpkg-configuration.json'
      - '.gitmodules'
      - 'extern/**'
permissions:
  contents: write
  pull-requests: write
jobs:
  build:
    if: >
      github.event_name != 'pull_request_target' ||
      github.event.pull_request.draft == false ||
      contains(github.event.pull_request.labels.*.name, 'force-build')
    name: build plugin and addons
    runs-on: windows-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    env:
      # Set environment variables for vcpkg
      VCPKG_FEATURE_FLAGS: manifests,registries
      VCPKG_DISABLE_METRICS: true
      
    steps:
        - uses: actions/checkout@v3
          with:
            submodules: recursive
            fetch-depth: 0
            
        - uses: ilammy/msvc-dev-cmd@v1.10.0

        # Cache the CMake build directory (including vcpkg dependencies)
        - name: Cache build directory
          uses: actions/cache@v3
          with:
            path: |
              build
              vcpkg_installed
            key: ${{ runner.os }}-build-cache-${{ inputs.cache-key-suffix || 'default' }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'CMakeLists.txt', 'CMakePresets.json', '.gitmodules') }}-${{ hashFiles('**/*.cpp', '**/*.c', '**/*.h', '**/*.hpp') }}
            restore-keys: |
              ${{ runner.os }}-build-cache-${{ inputs.cache-key-suffix || 'default' }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'CMakeLists.txt', 'CMakePresets.json', '.gitmodules') }}-
              ${{ runner.os }}-build-cache-${{ inputs.cache-key-suffix || 'default' }}-

        # Clone vcpkg for CMake to use (but don't run it directly)
        - name: Clone vcpkg
          run: |
            git clone https://github.com/microsoft/vcpkg.git
            .\vcpkg\bootstrap-vcpkg.bat
            
        - name: Configure and Build with CMake
          run: |
            # Create build directory if it doesn't exist
            mkdir -p build/ALL
            cd build/ALL
            
            # Configure with CMake, letting it handle vcpkg integration
            cmake ../.. -DCMAKE_TOOLCHAIN_FILE=../../vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows
            
            # Build
            cmake --build . --config Release
          
        - name: extract version from CMake
          id: get_version
          shell: bash
          run: |
            VERSION=$(grep 'CMAKE_PROJECT_VERSION:STATIC' build/ALL/CMakeCache.txt | cut -d= -f2)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            
        - name: Upload dist artifacts
          if: success()
          uses: actions/upload-artifact@v4
          with:
            name: dist-artifacts
            path: dist/
            
  prerelease:
    needs: build
    if: github.event_name == 'pull_request_target'
    runs-on: windows-latest
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: dist/
          
      - name: upload prerelease
        uses: ncipollo/release-action@v1
        with:
          name: "Community Shaders ${{ needs.build.outputs.version }} PR #${{ github.event.pull_request.number }}"
          tag: v${{ needs.build.outputs.version }}-pr${{ github.event.pull_request.number }}
          prerelease: true
          artifacts: "${{ github.workspace }}/dist/CommunityShaders_AIO-*.7z"
          generateReleaseNotes: true
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          
      - name: comment on PR
        if: success()
        uses: thollander/actions-comment-pull-request@v3
        with:
          mode: upsert
          message: |
            ✅ A pre-release build is available for this PR:
            [Download](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.build.outputs.version }}-pr${{ github.event.pull_request.number }})
            
  release:
    needs: build
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: dist/
          
      - name: create tagged release
        uses: ncipollo/release-action@v1
        with:
          name: "Community Shaders ${{ github.ref_name }}"
          draft: true
          tag: ${{ github.ref_name }}
          artifacts: "${{ github.workspace }}/dist/*.7z"
          generateReleaseNotes: true
          replacesArtifacts: true
          removeArtifacts: true