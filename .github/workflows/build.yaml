name: build Community Shaders and addons
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      cache-key-suffix:
        description: 'Optional suffix to invalidate the build cache'
        required: false
  pull_request_target:
    paths:
      - '**.cpp'
      - '**.h'
      - '**.hpp'
      - '**.c'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - 'vcpkg-configuration.json'
      - '.gitmodules'
      - 'extern/**'
permissions:
  contents: write
  pull-requests: write
jobs:
  build:
    if: >
      github.event_name != 'pull_request_target' ||
      github.event.pull_request.draft == false ||
      contains(github.event.pull_request.labels.*.name, 'force-build')
    name: build plugin and addons
    runs-on: windows-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    env:
      # Set environment variables for vcpkg
      VCPKG_FEATURE_FLAGS: manifests,registries
      VCPKG_DISABLE_METRICS: true
      
    steps:
        - uses: actions/checkout@v3
          with:
            submodules: recursive
            fetch-depth: 0
            
        - uses: ilammy/msvc-dev-cmd@v1.10.0

        # Setup vcpkg from Microsoft's official action
        - name: Setup vcpkg
          uses: lukka/get-cmake@latest
          
        # Cache the vcpkg installed packages
        - name: Cache vcpkg packages
          uses: actions/cache@v3
          with:
            path: |
              ${{ github.workspace }}/vcpkg_installed
            key: ${{ runner.os }}-vcpkg-installed-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
            restore-keys: |
              ${{ runner.os }}-vcpkg-installed-

        # Configure CMake with proper vcpkg toolchain integration
        - name: Configure CMake
          run: |
            # Clone vcpkg for use as our toolchain
            git clone https://github.com/microsoft/vcpkg.git
            cd vcpkg
            .\bootstrap-vcpkg.bat -disableMetrics
            cd ..
            
            # Configure using the CMakePresets.json with vcpkg toolchain
            cmake --preset=ALL -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
          
        # Build the project
        - name: Build
          run: |
            cmake --build --preset=ALL
            
        - name: extract version from CMake
          id: get_version
          shell: bash
          run: |
            VERSION=$(grep 'CMAKE_PROJECT_VERSION:STATIC' build/ALL/CMakeCache.txt | cut -d= -f2)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            
        - name: Upload dist artifacts
          if: success()
          uses: actions/upload-artifact@v4
          with:
            name: dist-artifacts
            path: dist/
            
  prerelease:
    needs: build
    if: github.event_name == 'pull_request_target'
    runs-on: windows-latest
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: dist/
          
      - name: upload prerelease
        uses: ncipollo/release-action@v1
        with:
          name: "Community Shaders ${{ needs.build.outputs.version }} PR #${{ github.event.pull_request.number }}"
          tag: v${{ needs.build.outputs.version }}-pr${{ github.event.pull_request.number }}
          prerelease: true
          artifacts: "${{ github.workspace }}/dist/CommunityShaders_AIO-*.7z"
          generateReleaseNotes: true
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          
      - name: comment on PR
        if: success()
        uses: thollander/actions-comment-pull-request@v3
        with:
          mode: upsert
          message: |
            ✅ A pre-release build is available for this PR:
            [Download](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.build.outputs.version }}-pr${{ github.event.pull_request.number }})
            
  release:
    needs: build
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: dist/
          
      - name: create tagged release
        uses: ncipollo/release-action@v1
        with:
          name: "Community Shaders ${{ github.ref_name }}"
          draft: true
          tag: ${{ github.ref_name }}
          artifacts: "${{ github.workspace }}/dist/*.7z"
          generateReleaseNotes: true
          replacesArtifacts: true
          removeArtifacts: true